<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Tharenkeeth Suthakaran</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --red: #d80505;
            --yellow: #feb902;
            --black: #0a0a0a;
            --white: #f5f0e8;
            --grey: #1a1a1a;
        }

        body {
            background: var(--black);
            color: var(--white);
            font-family: 'DM Mono', monospace;
            min-height: 100vh;
            display: grid;
            grid-template-columns: 1fr 1fr;
        }

        /* ─── LEFT PANEL ─── */
        .panel-left {
            background: var(--grey);
            border-right: 1px solid #222;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 48px;
        }

        .panel-logo a {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 15px;
            color: var(--yellow);
            text-decoration: none;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .panel-quote {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .panel-quote blockquote {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: clamp(32px, 3.5vw, 52px);
            line-height: 1.1;
            color: var(--white);
            margin-bottom: 32px;
        }

        .panel-quote blockquote span { color: var(--yellow); }

        .panel-quote p {
            font-size: 12px;
            color: #444;
            letter-spacing: 0.05em;
        }

        .panel-back a {
            font-size: 12px;
            letter-spacing: 0.12em;
            color: #444;
            text-decoration: none;
            text-transform: uppercase;
            transition: color 0.2s;
        }

        .panel-back a:hover { color: var(--white); }
        .panel-back a::before { content: '← '; }

        /* ─── RIGHT PANEL ─── */
        .panel-right {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 48px;
        }

        .login-box {
            width: 100%;
            max-width: 360px;
        }

        .login-tag {
            font-size: 10px;
            letter-spacing: 0.2em;
            color: var(--red);
            text-transform: uppercase;
            margin-bottom: 16px;
        }

        .login-title {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 40px;
            color: var(--white);
            margin-bottom: 48px;
            line-height: 1;
        }

        .form-field {
            margin-bottom: 20px;
        }

        .form-field label {
            display: block;
            font-size: 10px;
            letter-spacing: 0.2em;
            color: #555;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .form-field input {
            width: 100%;
            background: var(--grey);
            border: 1px solid #2a2a2a;
            color: var(--white);
            font-family: 'DM Mono', monospace;
            font-size: 14px;
            padding: 16px 18px;
            outline: none;
            transition: border-color 0.2s;
            appearance: none;
        }

        .form-field input::placeholder { color: #444; }

        .form-field input:focus { border-color: var(--yellow); }

        .form-submit {
            margin-top: 32px;
        }

        .form-submit button {
            width: 100%;
            background: var(--yellow);
            color: var(--black);
            font-family: 'Bebas Neue', sans-serif;
            font-size: 18px;
            letter-spacing: 0.12em;
            border: none;
            padding: 18px;
            cursor: pointer;
            transition: background 0.2s, transform 0.15s;
        }

        .form-submit button:hover { background: #ffd040; transform: translateY(-2px); }

        .form-footer {
            margin-top: 24px;
            font-size: 11px;
            color: #444;
            text-align: center;
        }

        .form-footer a {
            color: var(--yellow);
            text-decoration: none;
        }

        .form-footer a:hover { text-decoration: underline; }
    </style>
</head>
<body>

<!-- LEFT -->
<div class="panel-left">
    <div class="panel-logo">
        <a href="index.html">Tharenkeeth Suthakaran</a>
    </div>
    <div class="panel-quote">
        <blockquote>
            Log in to<br>manage your <span>blog.</span>
        </blockquote>
        <p>Post updates, share thoughts,<br>document your journey.</p>
    </div>
    <div class="panel-back">
        <a href="blog.html">Back to blog</a>
    </div>
</div>

<!-- RIGHT -->
<div class="panel-right">
    <div class="login-box">
        <p class="login-tag">Admin Access</p>
        <h1 class="login-title">Login</h1>

        <form method="post">
            <div class="form-field">
                <label for="username">Email</label>
                <input type="email" id="username" name="username" placeholder="your@email.com" required>
            </div>
            <div class="form-field">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
            </div>
            <div class="form-submit">
                <button type="submit">Login</button>
            </div>
        </form>

        <p class="form-footer">
            <a href="index.html#contact">Need access? Get in touch →</a>
        </p>
    </div>
</div>

</body>
</html>
