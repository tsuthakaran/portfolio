<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Post — Tharenkeeth Suthakaran</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --red: #d80505;
            --yellow: #feb902;
            --black: #0a0a0a;
            --white: #f5f0e8;
            --grey: #1a1a1a;
        }

        body {
            background: var(--black);
            color: var(--white);
            font-family: 'DM Mono', monospace;
            min-height: 100vh;
        }

        /* ─── TOP BAR ─── */
        header {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 100;
            height: 60px;
            background: var(--grey);
            border-bottom: 1px solid #222;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 48px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 32px;
        }

        .header-logo {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 14px;
            color: var(--yellow);
            text-decoration: none;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .header-divider {
            width: 1px;
            height: 20px;
            background: #2a2a2a;
        }

        .header-page {
            font-size: 11px;
            letter-spacing: 0.15em;
            color: #555;
            text-transform: uppercase;
        }

        .header-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .btn-header-cancel {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 15px;
            letter-spacing: 0.1em;
            color: #555;
            text-decoration: none;
            padding: 8px 20px;
            border: 1px solid #2a2a2a;
            transition: all 0.2s;
            cursor: pointer;
            background: none;
        }

        .btn-header-cancel:hover { color: var(--white); border-color: #444; }

        .btn-header-post {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 15px;
            letter-spacing: 0.1em;
            color: var(--black);
            background: var(--yellow);
            padding: 8px 24px;
            border: none;
            cursor: pointer;
            transition: background 0.2s, transform 0.15s;
        }

        .btn-header-post:hover { background: #ffd040; transform: translateY(-1px); }

        /* ─── MAIN ─── */
        main {
            padding-top: 60px;
            min-height: 100vh;
            display: grid;
            grid-template-columns: 1fr 320px;
        }

        /* ─── EDITOR ─── */
        .editor {
            padding: 64px 72px;
            border-right: 1px solid #1a1a1a;
        }

        .editor-tag {
            font-size: 10px;
            letter-spacing: 0.2em;
            color: var(--red);
            text-transform: uppercase;
            margin-bottom: 40px;
        }

        .title-input {
            width: 100%;
            background: none;
            border: none;
            border-bottom: 1px solid #1a1a1a;
            color: var(--white);
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: clamp(28px, 3vw, 44px);
            padding: 0 0 24px;
            outline: none;
            transition: border-color 0.2s;
            margin-bottom: 48px;
        }

        .title-input::placeholder { color: #2a2a2a; }
        .title-input:focus { border-color: var(--yellow); }

        .content-input {
            width: 100%;
            background: none;
            border: none;
            color: #aaa;
            font-family: 'DM Mono', monospace;
            font-size: 15px;
            line-height: 2;
            resize: none;
            outline: none;
            min-height: 480px;
        }

        .content-input::placeholder { color: #2a2a2a; }

        /* ─── SIDEBAR ─── */
        .post-sidebar {
            padding: 64px 40px;
            display: flex;
            flex-direction: column;
            gap: 40px;
        }

        .sidebar-widget {
            border: 1px solid #1a1a1a;
            padding: 24px;
        }

        .widget-label {
            font-size: 9px;
            letter-spacing: 0.2em;
            color: #444;
            text-transform: uppercase;
            margin-bottom: 16px;
            display: block;
        }

        .widget-select,
        .widget-input {
            width: 100%;
            background: var(--grey);
            border: 1px solid #2a2a2a;
            color: var(--white);
            font-family: 'DM Mono', monospace;
            font-size: 13px;
            padding: 12px 14px;
            outline: none;
            transition: border-color 0.2s;
            appearance: none;
        }

        .widget-select:focus,
        .widget-input:focus { border-color: var(--yellow); }

        .widget-select option { background: var(--grey); }

        .char-count {
            margin-top: 12px;
            font-size: 10px;
            color: #333;
            letter-spacing: 0.05em;
            text-align: right;
        }

        .word-count {
            display: flex;
            justify-content: space-between;
            margin-top: 12px;
        }

        .word-count span {
            font-size: 11px;
            color: #444;
        }

        .word-count strong {
            color: var(--white);
        }

        /* ─── PUBLISH BUTTON (mobile fallback) ─── */
        .publish-row {
            display: none;
        }
    </style>
</head>
<body>

<!-- TOP BAR -->
<header>
    <div class="header-left">
        <a href="index.html" class="header-logo">Tharenkeeth Suthakaran</a>
        <div class="header-divider"></div>
        <span class="header-page">New Post</span>
    </div>
    <div class="header-actions">
        <a href="blog.html" class="btn-header-cancel">Cancel</a>
        <button type="submit" form="post-form" class="btn-header-post">Publish Post</button>
    </div>
</header>

<!-- MAIN -->
<main>
    <div class="editor">
        <p class="editor-tag">New Blog Post</p>
        <form id="post-form" method="post">
            <input
                type="text"
                class="title-input"
                name="blog_title"
                placeholder="Post title..."
                id="title-field"
                required
            >
            <textarea
                class="content-input"
                name="blog_content"
                id="content-field"
                placeholder="Start writing..."
                required
            ></textarea>
        </form>
    </div>

    <aside class="post-sidebar">
        <div class="sidebar-widget">
            <span class="widget-label">Category</span>
            <select class="widget-select" name="category">
                <option value="">Select a category</option>
                <option value="general">General</option>
                <option value="tech">Tech</option>
                <option value="cs">Computer Science</option>
                <option value="life">Life</option>
            </select>
        </div>

        <div class="sidebar-widget">
            <span class="widget-label">Stats</span>
            <div class="word-count">
                <span>Words</span>
                <strong id="word-count">0</strong>
            </div>
            <div class="word-count" style="margin-top:8px;">
                <span>Characters</span>
                <strong id="char-count">0</strong>
            </div>
            <div class="word-count" style="margin-top:8px;">
                <span>Read time</span>
                <strong id="read-time">0 min</strong>
            </div>
        </div>

        <div class="sidebar-widget">
            <span class="widget-label">Danger Zone</span>
            <button
                type="reset"
                form="post-form"
                onclick="document.getElementById('word-count').textContent='0'; document.getElementById('char-count').textContent='0'; document.getElementById('read-time').textContent='0 min';"
                style="width:100%; background:none; border:1px solid #2a2a2a; color:#555; font-family:'Bebas Neue',sans-serif; font-size:15px; letter-spacing:0.1em; padding:12px; cursor:pointer; transition:all 0.2s;"
                onmouseover="this.style.borderColor='var(--red)'; this.style.color='var(--red)'"
                onmouseout="this.style.borderColor='#2a2a2a'; this.style.color='#555'"
            >
                Clear Post
            </button>
        </div>
    </aside>
</main>

<script>
    const contentField = document.getElementById('content-field');
    const wordCount = document.getElementById('word-count');
    const charCount = document.getElementById('char-count');
    const readTime = document.getElementById('read-time');

    contentField.addEventListener('input', () => {
        const text = contentField.value.trim();
        const words = text ? text.split(/\s+/).length : 0;
        const chars = contentField.value.length;
        wordCount.textContent = words;
        charCount.textContent = chars;
        readTime.textContent = Math.max(1, Math.ceil(words / 200)) + ' min';
    });
</script>

</body>
</html>
